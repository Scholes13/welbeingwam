name: CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      STRAVA_CLIENT_ID: placeholder-strava-client-id
      STRAVA_CLIENT_SECRET: placeholder-strava-client-secret
      NEXT_PUBLIC_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_TOKEN: placeholder-mapbox-token
      OPENROUTER_API_KEY_1: placeholder-openrouter-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify clean OpenNext build
        run: npm run ci:verify
